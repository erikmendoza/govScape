version: '3.8'
services:
  airflow-webserver:
    image: apache/airflow:2.10.2-python3.11
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow
      # Instala el provider de Docker al arrancar (simple para dev local)
      - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-docker==3.10.0
    volumes:
      # Conectamos las carpetas de Airflow
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin --firstname Erik --lastname DE --role Admin --email admin@example.com --password admin &&
      airflow webserver & airflow scheduler"